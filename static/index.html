<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeAI - المنصة السينمائية للأنمي</title>
    <meta name="description" content="منصة AnimeAI - شاهد أحدث الأنميات المترجمة مجاناً.">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/enhancements.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#8a2be2">
    <meta name="robots" content="index, follow">
</head>
<body>
    <div class="particles-container" id="particles-container"></div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo" onclick="window.location.href='/'">
                <i class="fas fa-play-circle"></i>
                <span class="shimmer">AnimeAI</span>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link active"><i class="fas fa-home"></i> الرئيسية</a>
                <a href="#" class="nav-link"><i class="fas fa-fire"></i> الشائعة</a>
                <a href="#" class="nav-link"><i class="fas fa-star"></i> الأعلى تقييماً</a>
                <a href="#" class="nav-link"><i class="fas fa-tv"></i> قيد العرض</a>
            </div>
            <div class="nav-actions">
                <button id="theme-toggle" class="icon-btn" title="تغيير الوضع"><i class="fas fa-moon"></i></button>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="ابحث عن أنمي...">
                    <button id="search-btn"><i class="fas fa-search"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="tabs-container">
            <button class="tab-btn active" data-tab="popular"><i class="fas fa-fire"></i> الأكثر شعبية</button>
            <button class="tab-btn" data-tab="top"><i class="fas fa-star"></i> الأعلى تقييماً</button>
            <button class="tab-btn" data-tab="airing"><i class="fas fa-tv"></i> قيد العرض</button>
            <button class="tab-btn" data-tab="upcoming"><i class="fas fa-clock"></i> قريباً</button>
        </div>
        <div class="anime-grid" id="anime-grid">
            <div class="loading-spinner"><div class="spinner"></div><p>جاري التحميل...</p></div>
        </div>
        <div class="load-more-container">
            <button id="load-more-btn" class="load-more-btn"><i class="fas fa-chevron-down"></i> عرض المزيد</button>
        </div>
    </main>

    <div class="video-overlay" id="video-overlay">
        <div class="video-modal">
            <div class="video-modal-header">
                <h3 id="video-title"></h3>
                <div class="modal-actions">
                    <button id="pip-btn" class="icon-btn"><i class="fas fa-window-restore"></i></button>
                    <button class="close-video icon-btn" id="close-video"><i class="fas fa-times"></i></button>
                </div>
            </div>
            <div class="video-modal-body">
                <div class="server-tabs" id="server-tabs"></div>
                <div class="custom-url-input" id="custom-url-input" style="display:none;">
                    <input type="text" id="custom-video-url" placeholder="الصق رابط الفيديو المباشر...">
                    <button id="load-custom-url">تحميل</button>
                </div>
                <div class="video-wrapper">
                    <video id="plyr-video-main" playsinline controls style="display:none;"></video>
                    <iframe id="video-frame" src="" allowfullscreen></iframe>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script src="/static/script.js"></script>
    <script src="/static/analytics.js"></script>
    <script src="/static/security.js"></script>
    <script src="/static/performance.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js');
        }
    </script>
</body>
  </html>
