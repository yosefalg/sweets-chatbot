<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">تفاصيل الأنمي - AnimeAI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#8a2be2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AnimeAI">
    <meta name="robots" content="index, follow">
    <link rel="sitemap" type="application/xml" href="/sitemap.xml">

    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/enhancements.css">

    <style>
        .particles-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .particle { position: absolute; background: #8a2be2; border-radius: 50%; animation: float linear infinite; opacity: 0; }
        @keyframes float { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.2; } 100% { transform: translateY(-10vh) scale(1.5); opacity: 0; } }
        .shimmer { background: linear-gradient(90deg, #8a2be2, #ff69b4, #ff8c00, #ff69b4, #8a2be2); background-size: 200% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 3s linear infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="cinematic">
    <div class="particles-container" id="particles-container"></div>

    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-logo" onclick="window.location.href='/'">
                <i class="fas fa-play-circle"></i>
                <span class="shimmer">AnimeAI</span>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link"><i class="fas fa-home"></i> الرئيسية</a>
                <a href="#" class="nav-link"><i class="fas fa-fire"></i> الشائعة</a>
            </div>
            <button class="theme-toggle" id="theme-toggle" title="تغيير الوضع">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <main class="anime-detail-container">
        <div class="anime-hero" id="anime-hero">
            <div class="anime-hero-bg" id="anime-hero-bg"></div>
            <canvas id="hero-canvas"></canvas>
            <div class="anime-hero-content">
                <div class="anime-poster" id="anime-poster-container">
                    <img id="anime-poster" src="" alt="">
                </div>
                <div class="anime-info-detailed">
                    <h1 id="anime-title-detailed" class="shimmer"></h1>
                    <h3 id="anime-title-english"></h3>
                    <div class="anime-meta">
                        <span class="meta-item"><i class="fas fa-star"></i> <span id="anime-score"></span></span>
                        <span class="meta-item"><i class="fas fa-tv"></i> <span id="anime-type"></span></span>
                        <span class="meta-item"><i class="fas fa-list-ol"></i> <span id="anime-episodes"></span> حلقة</span>
                        <span class="meta-item"><i class="fas fa-clock"></i> <span id="anime-duration"></span></span>
                        <span class="meta-item"><i class="fas fa-calendar"></i> <span id="anime-aired"></span></span>
                        <span class="meta-item"><i class="fas fa-users"></i> <span id="anime-members"></span> متابع</span>
                    </div>
                    <div class="anime-genres" id="anime-genres"></div>
                    <p class="anime-synopsis" id="anime-synopsis"></p>
                    <div class="anime-actions">
                        <button class="btn-primary glow" id="watch-first-episode">
                            <i class="fas fa-play"></i> شاهد الحلقة الأولى
                        </button>
                        <button class="btn-secondary" id="add-to-favorites">
                            <i class="fas fa-heart"></i> أضف للمفضلة
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <section class="episodes-section">
            <h2 class="section-title">جميع الحلقات</h2>
            <div class="episodes-filter">
                <input type="text" id="episode-search" placeholder="ابحث عن رقم الحلقة...">
                <select id="episode-sort">
                    <option value="asc">من الأقدم للأحدث</option>
                    <option value="desc">من الأحدث للأقدم</option>
                </select>
            </div>
            <div class="episodes-grid" id="episodes-grid">
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <p>جاري تحميل الحلقات...</p>
                </div>
            </div>
        </section>
    </main>

    <div class="video-overlay" id="video-overlay">
        <div class="video-modal cinematic-modal">
            <div class="video-modal-header">
                <h3 id="video-title">جاري التحميل...</h3>
                <div class="modal-actions">
                    <button id="pip-btn" title="صورة داخل صورة"><i class="fas fa-window-restore"></i></button>
                    <button class="close-video" id="close-video"><i class="fas fa-times"></i></button>
                </div>
            </div>
            <div class="video-modal-body">
                <div class="server-tabs" id="server-tabs">
                    <!-- السيرفرات ستضاف ديناميكياً -->
                </div>
                <div class="custom-url-input" id="custom-url-input" style="display: none;">
                    <input type="text" id="custom-video-url" placeholder="الصق رابط الفيديو المباشر هنا...">
                    <button id="load-custom-url" class="glow">تحميل</button>
                </div>
                <div class="video-wrapper">
                    <video id="plyr-video-main" playsinline controls style="display: none;"></video>
                    <iframe id="video-frame" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-bottom">
            <p>© 2025 AnimeAI. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script src="/static/anime.js"></script>
    <script src="/static/analytics.js"></script>
    <script src="/static/security.js"></script>
    <script src="/static/performance.js"></script>
</body>
</html>
